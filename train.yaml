model:
  name: "gpt2-medium"  # HuggingFace model ID
  model_size: "1.5B"
  pretrained: true
  dtype: "float32"
  device: "cuda"

training:
  num_epochs: 3
  batch_size: 32
  gradient_accumulation_steps: 2
  learning_rate: 5.0e-6
  warmup_steps: 500
  max_steps: 50000
  eval_every: 500
  save_every: 1000
  log_every: 10
  optimizer: "adamw"
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42

grpo:
  num_groups: 4
  group_size: 8
  kl_coeff: 0.05  # KL penalty coefficient
  reward_coeff: 1.0
  entropy_coeff: 0.0
  policy_clip_range: 0.2

rlvr:
  # Reward and Loss Velocity Regularization
  loss_velocity_coeff: 0.01
  reward_velocity_coeff: 0.01
  velocity_window: 10  # steps for computing velocity

data:
  quality_filter_top_k: 10000
  total_samples: 40000
  val_split: 0.1
  test_split: 0.1
  num_workers: 4
  prefetch_factor: 2
  datasets:
    - "logic_puzzles"
    - "gsm8k"
    - "math"

eval:
  catastrophic_forgetting_threshold: 0.05  # 5% drop triggers alert
  general_knowledge_samples: 1000
  logic_samples: 2000
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.95

checkpointing:
  save_dir: "outputs/checkpoints"
  keep_best_k: 3
  metric: "logic_accuracy"
  mode: "max"

wandb:
  project: "recursive-logic-engine"
  entity: "null"  # Set to your W&B team
  tags: ["grpo", "reasoning", "self-correction"]
  notes: "Training reasoning specialist with GRPO+RLVR"

logging:
  level: "INFO"
  log_file: "outputs/training.log"
